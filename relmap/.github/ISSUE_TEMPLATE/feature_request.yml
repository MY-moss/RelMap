name: Feature Request
description: Suggest an idea for this project
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 需求描述
      description: 这个功能解决了什么问题？请清晰描述你的需求。
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: 使用场景
      description: 在什么场景下你会用到这个功能？请描述具体的使用流程或目标用户。
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 期望效果
      description: 你期望的实现方式或最终效果
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
  - type: textarea
    id: context
    attributes:
      label: 补充说明
